services:
  bot:
    build: .
    image: bot-tracker:latest
    # UID/GID из .env (см. .env.example) — должны совпадать с id -u / id -g на хосте.
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      # Для WHISPER_MODE=local: смонтируй готовый бинарь whisper.cpp и модель, например:
      # - /opt/whisper:/opt/whisper:ro
      # и укажи WHISPER_CPP_PATH=/opt/whisper/whisper-cli, WHISPER_MODEL_PATH=...
    restart: unless-stopped
